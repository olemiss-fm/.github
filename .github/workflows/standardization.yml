name: Standard GitHub Workflow Setup

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  setup-standard-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Apply Standard Labels
        run: |
          gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"
          LABELS=(
            "bug:#d73a4a:Something isn't working"
            "feature:#0e8a16:New feature request"
            "enhancement:#a2eeef:Improvements to an existing feature"
            "triage-needed:#d876e3:Needs team review"
            "documentation:#0075ca:Documentation changes"
            "high-priority:#b60205:Urgent issue"
          )
          for repo in $(gh repo list olemiss-fm --json name --jq '.[].name'); do
            for label in "${LABELS[@]}"; do
              IFS=":" read -r name color desc <<< "$label"
              gh label create "$name" --color "$color" --description "$desc" --repo "olemiss-fm/$repo" || \
              gh label edit "$name" --color "$color" --description "$desc" --repo "olemiss-fm/$repo"
            done
          done
